services:
  monitor:
    build: .
    container_name: microsoft-status-monitor
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./auth.json:/app/auth.json
      - ./state.json:/app/state.json
      - ./screenshots:/app/screenshots
    environment:
      - HEADLESS=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
